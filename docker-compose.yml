services:
  mysql:
    image: mysql:8.4
    container_name: eyedcomun-mysql
    restart: unless-stopped
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_0900_ai_ci
    environment:
      MYSQL_DATABASE: eyedcomun
      MYSQL_USER: eyedcomun
      MYSQL_PASSWORD: "${MYSQL_PASSWORD}"
      MYSQL_ROOT_PASSWORD: "${MYSQL_ROOT_PASSWORD}"
    volumes:
      - "${EYEDCOMUN_DATA_ROOT:-/srv/dev-disk-by-uuid-94f2a4b3-1a12-41f9-b0ee-e78aa049c7ea/SSD512/docker/eyedcomun}/mysql:/var/lib/mysql"
    networks:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -u root --password=\"$${MYSQL_ROOT_PASSWORD}\" --silent"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  eyedcomun:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: eyedcomun
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    ports:
      - "${EYEDCOMUN_PORT:-3001}:3000"
    environment:
      NODE_ENV: production
      AUTH_SECRET: "${AUTH_SECRET}"
      AUTH_DISCORD_ID: "${AUTH_DISCORD_ID}"
      AUTH_DISCORD_SECRET: "${AUTH_DISCORD_SECRET}"
      AUTH_URL: "${AUTH_URL}"
      AUTH_TRUST_HOST: "true"
      DISCORD_GUILD_ID: "${DISCORD_GUILD_ID:?configura DISCORD_GUILD_ID}"
      EYEDBOT_API_URL: "${EYEDBOT_API_URL:?configura una URL de EyedBot accesible desde este contenedor}"
      COMMUNITY_API_KEY: "${COMMUNITY_API_KEY:?configura COMMUNITY_API_KEY}"
      COMMUNITY_SIGNING_SECRET: "${COMMUNITY_SIGNING_SECRET:?configura COMMUNITY_SIGNING_SECRET}"
      EYEDBOT_WS_URL: "${EYEDBOT_WS_URL:?configura una URL WebSocket de EyedBot accesible desde los navegadores}"
      EYEDBOT_API_KEY: "${EYEDBOT_API_KEY}"
      DB_HOST: mysql
      DB_PORT: "3306"
      DB_NAME: eyedcomun
      DB_USER: eyedcomun
      DB_PASSWORD: "${MYSQL_PASSWORD}"
      MEDIA_ENCRYPTION_KEY: "${MEDIA_ENCRYPTION_KEY}"
      MEDIA_ENCRYPTION_KEY_VERSION: "1"
      MEDIA_STORAGE_PATH: /app/uploads
    volumes:
      - "${EYEDCOMUN_DATA_ROOT:-/srv/dev-disk-by-uuid-94f2a4b3-1a12-41f9-b0ee-e78aa049c7ea/SSD512/docker/eyedcomun}/uploads:/app/uploads"
    networks:
      - backend
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000/api/ready').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 45s

networks:
  backend:
    driver: bridge
